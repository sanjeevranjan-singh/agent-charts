apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.agent.name }}-metadata
  labels:
    app.kubernetes.io/name: {{ .Values.agent.name }}
    agentcert.io/managed: "true"
    agentcert.io/version: {{ .Values.agent.version | quote }}
  annotations:
    agentcert.io/vendor: {{ .Values.agent.vendor | quote }}
    agentcert.io/mode: {{ .Values.agent.mode | quote }}
    agentcert.io/scope: {{ .Values.agent.scope | quote }}
    agentcert.io/capabilities: {{ .Values.agent.capabilities | join "," | quote }}
    agentcert.io/project-id: {{ .Values.app.chaosCenter.projectId | quote }}
data:
  agent-metadata.json: |
    {
      "name": "{{ .Values.agent.name }}",
      "version": "{{ .Values.agent.version }}",
      "vendor": "{{ .Values.agent.vendor }}",
      "mode": "{{ .Values.agent.mode }}",
      "scope": "{{ .Values.agent.scope }}",
      "capabilities": {{ .Values.agent.capabilities | toJson }},
      "supportedExperiments": {{ .Values.agent.supportedExperiments | toJson }}
    }
{{ toYaml .Values.agent.config | nindent 2 }}

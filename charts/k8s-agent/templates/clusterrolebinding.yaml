{{- if .Values.rbac.cluster.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.agent.name }}-cluster-role-binding
subjects:
  - kind: ServiceAccount
    name: {{ .Values.agent.name }}-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.agent.name }}-cluster-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}

# Agent identity — set at deploy time via: helm install --set agentId=<uuid>
agentId: ""

app:
  chaosCenter:
    endpoint: http://chaoscenter.litmus.svc.cluster.local
    projectId: litmus-project-1
    clusterId: cluster-1

agent:
  name: flash-agent
  version: "1.0.0"
  vendor: "Litmus"

  mode: active          # Litmus agents are usually active
  scope: cluster        # cluster / namespace

  capabilities:
    - kubernetes log metrics extraction

  supportedExperiments:
    - log-analysis
    - health-scoring

  containerImage:
    registry: docker.io
    repository: agentcert/agentcert-flash-agent
    tag: latest
    pullPolicy: Always

  config:
    # --- LiteLLM Proxy ---
    LITELLM_URL: "http://litellm-proxy.litellm.svc.cluster.local:4000"
    MODEL_ALIAS: "gpt-4o-mini"
    # OpenAI SDK compatibility — note the /v1 suffix required by the SDK
    OPENAI_BASE_URL: "http://litellm-proxy.litellm.svc.cluster.local:4000/v1"
    OPENAI_API_KEY: "sk-agentcert-2026"

    # --- Persistent watermark (deployment mode only) ---
    # Loaded by flash-agent on start, fsynced after each successful scan.
    # Set empty to disable persistence (in-memory only — fine for cronjob).
    WATERMARK_FILE: "/var/lib/flash-agent/watermark.json"

    # --- Agent runtime ---
    K8S_NAMESPACE: "sock-shop"
    # Namespace where chaos infra + MCP servers are deployed. Override per
    # cluster (e.g. some envs use "litmus", others "litmus-exp").
    CHAOS_NAMESPACE: "litmus-exp"
    TARGET_APP_NAME: "sock-shop"
    SCAN_INTERVAL: "60"       # seconds; 0 = run once (CronJob), >0 = continuous (Deployment)
    SCAN_INTERVAL_FAST: "15"  # seconds; used when health is degraded (adaptive scan)
    SCAN_HEALTH_THRESHOLD: "100"  # score below which fast scan engages (0–100)
    ENABLE_PROMETHEUS_SNAPSHOT: "true"  # always-augment kubernetes MCP with Prometheus metrics
    LOG_TRIM: "8"           # greedy log dedup window (0=disable, 8=AIOpsLab default)
    AGENT_REASONING_MODE: "single-shot"  # "single-shot" or "react" (multi-turn ReAct loop, opt-in)
    AGENT_REACT_MAX_STEPS: "8"           # max tool-call iterations when AGENT_REASONING_MODE=react

    # --- Experiment context (injected by install-agent via Argo template variables) ---
    # Empty defaults: flash-agent works with or without experiment context.
    # When running inside an Argo Workflow, install-agent passes:
    #   --set agent.config.NOTIFY_ID={{workflow.labels.notify_id}}
    #   --set agent.config.EXPERIMENT_ID={{workflow.labels.workflow_id}}
    #   --set agent.config.EXPERIMENT_RUN_ID={{workflow.uid}}
    #   --set agent.config.WORKFLOW_NAME={{workflow.labels.subject}}
    NOTIFY_ID: ""
    EXPERIMENT_ID: ""
    EXPERIMENT_RUN_ID: ""
    WORKFLOW_NAME: ""
    # Ground truth for the faults in this workflow run.
    # Populated at install time by the GraphQL server: base64-encoded JSON map of
    # { fault_name: ground_truth_content } sourced from the chaos hub filesystem.
    # Empty string means no ground truth is available (hub files not yet created).
    GROUND_TRUTH_JSON: ""

    # --- MCP tool servers ---
    # Default to the same namespace as CHAOS_NAMESPACE (litmus-exp). Override
    # K8S_MCP_URL / PROM_MCP_URL directly when the MCP servers live elsewhere.
    K8S_MCP_URL: "http://kubernetes-mcp-server.litmus-exp.svc.cluster.local:8081/mcp"
    PROM_MCP_URL: "http://prometheus-mcp-server.litmus-exp.svc.cluster.local:9090/mcp"
    MCP_TIMEOUT: "30"

  secret:
    LITELLM_MASTER_KEY: "sk-agentcert-2026"

  deploymentEnv:
    # NOTE: K8S_NAMESPACE, SCAN_INTERVAL, SCAN_INTERVAL_FAST and
    # SCAN_HEALTH_THRESHOLD are injected directly by deployment.yaml's
    # static env block — do NOT list them here or kubelet will see
    # duplicate env vars (it keeps the first occurrence and drops the rest,
    # so ConfigMap-based overrides would silently no-op).
    - name: ENABLE_PROMETHEUS_SNAPSHOT
      key: ENABLE_PROMETHEUS_SNAPSHOT
    - name: LOG_TRIM
      key: LOG_TRIM
    - name: AGENT_REASONING_MODE
      key: AGENT_REASONING_MODE
    - name: AGENT_REACT_MAX_STEPS
      key: AGENT_REACT_MAX_STEPS
    # OpenAI SDK compat (separate keys with /v1 suffix)
    - name: OPENAI_BASE_URL
      key: OPENAI_BASE_URL
    - name: OPENAI_API_KEY
      key: OPENAI_API_KEY
    # MCP tool servers
    - name: K8S_MCP_URL
      key: K8S_MCP_URL
    - name: PROM_MCP_URL
      key: PROM_MCP_URL
    - name: MCP_TIMEOUT
      key: MCP_TIMEOUT
    # Chaos
    - name: CHAOS_NAMESPACE
      key: CHAOS_NAMESPACE
    - name: TARGET_APP_NAME
      key: TARGET_APP_NAME
    # Experiment context (populated by install-agent --set from Argo template variables)
    - name: NOTIFY_ID
      key: NOTIFY_ID
    - name: EXPERIMENT_ID
      key: EXPERIMENT_ID
    - name: EXPERIMENT_RUN_ID
      key: EXPERIMENT_RUN_ID
    - name: WORKFLOW_NAME
      key: WORKFLOW_NAME
  mcpInteractionsFile: "/tmp/mcp/mcp_interactions.jsonl"

# ── agent-sidecar: transparent metadata-injection proxy ──────────────
# When enabled, a lightweight sidecar container intercepts agent→LiteLLM
# requests, injects experiment context (EXPERIMENT_ID, EXPERIMENT_RUN_ID,
# WORKFLOW_NAME) into the metadata field, and forwards to upstream.
# The agent has ZERO awareness of experiment context.
sidecar:
  enabled: true
  name: agent-sidecar
  image:
    registry: docker.io
    repository: agentcert/agent-sidecar
    tag: latest
    pullPolicy: Always
  port: 4001
  # The real LiteLLM proxy URL — sidecar forwards enriched requests here
  upstream: "http://litellm-proxy.litellm.svc.cluster.local:4000"
  # Injection mode: "openai-metadata" | "http-header" | "none"
  injectionMode: "openai-metadata"
  resources:
    limits:
      cpu: "100m"
      memory: "64Mi"

env:
  mongoUri: mongodb://mongo-mongodb:27017

# ── Persistent watermark state ───────────────────────────────────────
# When persist=true, a PVC is created and mounted at /var/lib/flash-agent
# so the MCP event watermark survives pod restarts and image upgrades.
# Without this, every restart re-flags ~minutes of stale signals until
# the in-memory watermark catches up.
watermark:
  persist: true
  storageClass: ""        # empty = cluster default
  size: 64Mi
  accessMode: ReadWriteOnce

# ── Pod hardening: probes, grace, priority ───────────────────────────
# Probes use file markers written by the agent (touch on first ready /
# end of every scan).  Liveness fires only if no scan completed in
# `livenessStaleSeconds`, so a single slow LLM call won't kill the pod.
probes:
  enabled: true
  readyFile: /tmp/flash-agent-ready
  aliveFile: /tmp/flash-agent-alive
  livenessStaleSeconds: 180
  initialDelaySeconds: 60
  periodSeconds: 30

# Grace period for SIGTERM handler in main.py to finish current scan.
terminationGracePeriodSeconds: 60

# Avoid eviction during memory-hog / cpu-hog experiments.  Empty string
# disables.  "system-cluster-critical" is a built-in PriorityClass; on
# clusters without it, set to a custom class or leave empty.
priorityClassName: ""

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "1.5Gi"     # Bumped from 512Mi — agent needs more for LLM tool-call chains

rbac:
  cluster:
    create: true
    rules:
      # Read access to pods and logs
      - apiGroups: [""]
        resources: ["pods", "pods/log", "pods/status", "events"]
        verbs: ["get", "list", "watch"]
      # Read access to higher-level resources
      - apiGroups: ["apps"]
        resources: ["deployments", "replicasets", "statefulsets"]
        verbs: ["get", "list", "watch"]

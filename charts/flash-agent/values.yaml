app:
  chaosCenter:
    endpoint: http://chaoscenter.litmus.svc.cluster.local
    projectId: litmus-project-1
    clusterId: cluster-1

agent:
  name: flash-agent
  version: "1.0.0"
  vendor: "Litmus"

  mode: active          # Litmus agents are usually active
  scope: cluster        # cluster / namespace

  capabilities:
    - kubernetes log metrics extraction
    - langfuse trace reporting

  supportedExperiments:
    - log-analysis
    - health-scoring

  containerImage:
    registry: docker.io
    repository: agentcert/flash-agent
    tag: latest

  config:
    LITELLM_URL: "http://litellm-proxy.litellm.svc.cluster.local:4000"
    MODEL_ALIAS: "gpt-4o-mini"
    K8S_NAMESPACE: "sock-shop"
    SCAN_INTERVAL: "0"        # 0 = run once (CronJob), >0 = continuous (Deployment)
    LOG_TAIL_LINES: "200"
    OTEL_EXPORTER_OTLP_ENDPOINT: ""   # Set to Langfuse OTEL endpoint, e.g. https://<LANGFUSE_HOST>/api/public/otel

  secret:
    LITELLM_MASTER_KEY: "sk-1234"
    LANGFUSE_SECRET_KEY: ""
    LANGFUSE_PUBLIC_KEY: ""

  deploymentEnv:
    - name: K8S_NAMESPACE
      key: K8S_NAMESPACE
    - name: SCAN_INTERVAL
      key: SCAN_INTERVAL
    - name: LOG_TAIL_LINES
      key: LOG_TAIL_LINES

  traceTags:
    - flash-agent
    - itops
    - log-metrics

env:
  mongoUri: mongodb://mongo-mongodb:27017

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"

rbac:
  cluster:
    create: true
    rules:
      # Read access to pods and logs
      - apiGroups: [""]
        resources: ["pods", "pods/log", "pods/status", "events"]
        verbs: ["get", "list", "watch"]
      # Read access to higher-level resources
      - apiGroups: ["apps"]
        resources: ["deployments", "replicasets", "statefulsets"]
        verbs: ["get", "list", "watch"]

cronjob:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  restartPolicy: OnFailure

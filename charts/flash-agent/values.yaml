app:
  chaosCenter:
    endpoint: http://chaoscenter.litmus.svc.cluster.local
    projectId: litmus-project-1
    clusterId: cluster-1

agent:
  name: flash-agent
  version: "1.0.0"
  vendor: "Litmus"

  mode: active          # Litmus agents are usually active
  scope: cluster        # cluster / namespace

  capabilities:
    - kubernetes log metrics extraction

  supportedExperiments:
    - log-analysis
    - health-scoring

  containerImage:
    registry: docker.io
    repository: agentcert/flash-agent
    tag: latest
    pullPolicy: Always   # Changed from IfNotPresent for rapid iteration

  config:
    # --- LiteLLM Proxy ---
    LITELLM_URL: "http://litellm-proxy.litellm.svc.cluster.local:4000"
    MODEL_ALIAS: "gpt-4o-mini"
    # OpenAI SDK compatibility — note the /v1 suffix required by the SDK
    OPENAI_BASE_URL: "http://litellm-proxy.litellm.svc.cluster.local:4000/v1"
    OPENAI_API_KEY: "sk-agentcert-2026"

    # --- Agent runtime ---
    K8S_NAMESPACE: "sock-shop"
    CHAOS_NAMESPACE: "litmus"
    SCAN_INTERVAL: "60"       # seconds; 0 = run once (CronJob), >0 = continuous (Deployment)
    LOG_TAIL_LINES: "500"

    # --- MCP tool servers ---
    K8S_MCP_URL: "http://kubernetes-mcp-server.litmus.svc.cluster.local:8081/mcp"
    PROM_MCP_URL: "http://prometheus-mcp-server.litmus.svc.cluster.local:9090/mcp"
    MCP_TIMEOUT: "30"

  secret:
    LITELLM_MASTER_KEY: "sk-agentcert-2026"

  deploymentEnv:
    # Existing
    - name: K8S_NAMESPACE
      key: K8S_NAMESPACE
    - name: SCAN_INTERVAL
      key: SCAN_INTERVAL
    - name: LOG_TAIL_LINES
      key: LOG_TAIL_LINES
    # OpenAI SDK compat (separate keys with /v1 suffix)
    - name: OPENAI_BASE_URL
      key: OPENAI_BASE_URL
    - name: OPENAI_API_KEY
      key: OPENAI_API_KEY
    # MCP tool servers
    - name: K8S_MCP_URL
      key: K8S_MCP_URL
    - name: PROM_MCP_URL
      key: PROM_MCP_URL
    - name: MCP_TIMEOUT
      key: MCP_TIMEOUT
    # Chaos
    - name: CHAOS_NAMESPACE
      key: CHAOS_NAMESPACE

  mcpInteractionsFile: "/tmp/mcp/mcp_interactions.jsonl"

env:
  mongoUri: mongodb://mongo-mongodb:27017

resources:
  limits:
    cpu: "500m"
    memory: "1.5Gi"     # Bumped from 512Mi — agent needs more for LLM tool-call chains

rbac:
  cluster:
    create: true
    rules:
      # Read access to pods and logs
      - apiGroups: [""]
        resources: ["pods", "pods/log", "pods/status", "events"]
        verbs: ["get", "list", "watch"]
      # Read access to higher-level resources
      - apiGroups: ["apps"]
        resources: ["deployments", "replicasets", "statefulsets"]
        verbs: ["get", "list", "watch"]

cronjob:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  restartPolicy: OnFailure

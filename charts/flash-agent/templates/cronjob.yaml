apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Values.agent.name }}-cronjob
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  concurrencyPolicy: {{ .Values.cronjob.concurrencyPolicy | default "Forbid" }}
  successfulJobsHistoryLimit: {{ .Values.cronjob.successfulJobsHistoryLimit | default 1 }}
  failedJobsHistoryLimit: {{ .Values.cronjob.failedJobsHistoryLimit | default 1 }}

  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: {{ .Values.agent.name }}
        spec:
          serviceAccountName: {{ .Values.agent.name }}-sa
          restartPolicy: {{ .Values.cronjob.restartPolicy }}
          containers:
          - name: agent
            image: "{{ .Values.agent.containerImage.registry }}/{{ .Values.agent.containerImage.repository }}:{{ .Values.agent.containerImage.tag }}"
            imagePullPolicy: IfNotPresent

            resources:
              {{- toYaml .Values.resources | nindent 14 }}

            env:
              # ChaosCenter connection
              - name: CHAOS_CENTER_ENDPOINT
                value: {{ .Values.app.chaosCenter.endpoint | quote }}

              - name: CHAOS_PROJECT_ID
                value: {{ .Values.app.chaosCenter.projectId | quote }}

              - name: CHAOS_CLUSTER_ID
                value: {{ .Values.app.chaosCenter.clusterId | quote }}

              # Agent identity
              - name: AGENT_NAME
                value: {{ .Values.agent.name | quote }}

              - name: AGENT_MODE
                value: {{ .Values.agent.mode | quote }}

              - name: AGENT_SCOPE
                value: {{ .Values.agent.scope | quote }}

              # Infra dependencies
              - name: MONGO_URI
                value: {{ .Values.env.mongoUri | quote }}

              # LiteLLM Proxy Configuration
              - name: LITELLM_URL
                valueFrom:
                  configMapKeyRef:
                    name: {{ .Values.agent.name }}-metadata
                    key: LITELLM_URL
              
              - name: LITELLM_MASTER_KEY
                valueFrom:
                  secretKeyRef:
                    name: {{ .Values.agent.name }}-secret
                    key: LITELLM_MASTER_KEY
              
              - name: MODEL_ALIAS
                valueFrom:
                  configMapKeyRef:
                    name: {{ .Values.agent.name }}-metadata
                    key: MODEL_ALIAS
              
              # NOTE: OTEL and Langfuse env vars removed — LiteLLM proxy
              # handles all Langfuse tracing via success_callback.

  {{- range $env := .Values.agent.deploymentEnv }}
  {{- if and $.Values.sidecar.enabled (eq $env.name "OPENAI_BASE_URL") }}
  {{- /* Skip — sidecar override below takes precedence */ -}}
  {{- else }}
              - name: {{ $env.name }}
                valueFrom:
                  configMapKeyRef:
                    name: {{ $.Values.agent.name }}-metadata
                    key: {{ $env.key }}
  {{- end }}
  {{- end }}

  {{- if .Values.sidecar.enabled }}
              # Override OPENAI_BASE_URL to route through agent-sidecar
              - name: OPENAI_BASE_URL
                value: "http://localhost:{{ .Values.sidecar.port }}/v1"
  {{- end }}

              # MCP interactions log
              {{- if .Values.agent.mcpInteractionsFile }}
              - name: MCP_INTERACTIONS_FILE
                value: {{ .Values.agent.mcpInteractionsFile | quote }}
              {{- end }}

            volumeMounts:
              - name: agent-metadata
                mountPath: /etc/agent/metadata
                readOnly: true

  {{- if .Values.sidecar.enabled }}
          # ── agent-sidecar: transparent metadata-injection proxy ──────
          - name: {{ .Values.sidecar.name }}
            image: "{{ .Values.sidecar.image.registry }}/{{ .Values.sidecar.image.repository }}:{{ .Values.sidecar.image.tag }}"
            imagePullPolicy: {{ .Values.sidecar.image.pullPolicy | default "IfNotPresent" }}
            ports:
              - containerPort: {{ .Values.sidecar.port }}
                protocol: TCP
            env:
              - name: SIDECAR_PORT
                value: {{ .Values.sidecar.port | quote }}
              - name: UPSTREAM_URL
                value: {{ .Values.sidecar.upstream | quote }}
              - name: EXPERIMENT_ID
                valueFrom:
                  configMapKeyRef:
                    name: {{ .Values.agent.name }}-metadata
                    key: EXPERIMENT_ID
              - name: EXPERIMENT_RUN_ID
                valueFrom:
                  configMapKeyRef:
                    name: {{ .Values.agent.name }}-metadata
                    key: EXPERIMENT_RUN_ID
              - name: WORKFLOW_NAME
                valueFrom:
                  configMapKeyRef:
                    name: {{ .Values.agent.name }}-metadata
                    key: WORKFLOW_NAME
            resources:
              {{- toYaml .Values.sidecar.resources | nindent 14 }}
  {{- end }}

          volumes:
            - name: agent-metadata
              configMap:
                name: {{ .Values.agent.name }}-metadata

apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Values.agent.name }}-cronjob
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  concurrencyPolicy: {{ .Values.cronjob.concurrencyPolicy | default "Forbid" }}
  successfulJobsHistoryLimit: {{ .Values.cronjob.successfulJobsHistoryLimit | default 1 }}
  failedJobsHistoryLimit: {{ .Values.cronjob.failedJobsHistoryLimit | default 1 }}

  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: {{ .Values.agent.name }}
        spec:
          serviceAccountName: {{ .Values.agent.name }}-sa
          restartPolicy: {{ .Values.cronjob.restartPolicy }}
          containers:
          - name: agent
            image: "{{ .Values.agent.containerImage.registry }}/{{ .Values.agent.containerImage.repository }}:{{ .Values.agent.containerImage.tag }}"
            imagePullPolicy: IfNotPresent

            resources:
              {{- toYaml .Values.resources | nindent 14 }}

            env:
              # ChaosCenter connection
              - name: CHAOS_CENTER_ENDPOINT
                value: {{ .Values.app.chaosCenter.endpoint | quote }}

              - name: CHAOS_PROJECT_ID
                value: {{ .Values.app.chaosCenter.projectId | quote }}

              - name: CHAOS_CLUSTER_ID
                value: {{ .Values.app.chaosCenter.clusterId | quote }}

              # Agent identity
              - name: AGENT_NAME
                value: {{ .Values.agent.name | quote }}

              - name: AGENT_MODE
                value: {{ .Values.agent.mode | quote }}

              - name: AGENT_SCOPE
                value: {{ .Values.agent.scope | quote }}

              # Infra dependencies
              - name: MONGO_URI
                value: {{ .Values.env.mongoUri | quote }}

              # LiteLLM Proxy Configuration
              - name: LITELLM_URL
                valueFrom:
                  configMapKeyRef:
                    name: {{ .Values.agent.name }}-metadata
                    key: LITELLM_URL
              
              - name: LITELLM_MASTER_KEY
                valueFrom:
                  secretKeyRef:
                    name: {{ .Values.agent.name }}-secret
                    key: LITELLM_MASTER_KEY
              
              - name: MODEL_ALIAS
                valueFrom:
                  configMapKeyRef:
                    name: {{ .Values.agent.name }}-metadata
                    key: MODEL_ALIAS
              
              # Tracing Configuration
              - name: TRACE_TAGS
                value: {{ .Values.agent.traceTags | join "," | quote }}

              - name: OTEL_SERVICE_NAME
                value: {{ .Values.agent.name }}

              - name: OTEL_EXPORTER_OTLP_ENDPOINT
                valueFrom:
                  configMapKeyRef:
                    name: {{ .Values.agent.name }}-metadata
                    key: OTEL_EXPORTER_OTLP_ENDPOINT

              - name: LANGFUSE_PUBLIC_KEY
                valueFrom:
                  secretKeyRef:
                    name: {{ .Values.agent.name }}-secret
                    key: LANGFUSE_PUBLIC_KEY

              - name: LANGFUSE_SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: {{ .Values.agent.name }}-secret
                    key: LANGFUSE_SECRET_KEY

  {{- range $env := .Values.agent.deploymentEnv }}
              - name: {{ $env.name }}
                valueFrom:
                  configMapKeyRef:
                    name: {{ $.Values.agent.name }}-metadata
                    key: {{ $env.key }}
  {{- end }}

            volumeMounts:
              - name: agent-metadata
                mountPath: /etc/agent/metadata
                readOnly: true

          volumes:
            - name: agent-metadata
              configMap:
                name: {{ .Values.agent.name }}-metadata

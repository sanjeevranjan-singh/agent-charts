apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.agent.name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Values.agent.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.agent.name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ .Values.agent.name }}-sa
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 60 }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName | quote }}
      {{- end }}
      containers:
        - name: agent
          image: "{{ .Values.agent.containerImage.registry }}/{{ .Values.agent.containerImage.repository }}:{{ .Values.agent.containerImage.tag }}"
          imagePullPolicy: {{ .Values.agent.containerImage.pullPolicy | default "Always" }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          env:
            # Namespace under observation. Defaults to the release namespace
            # for back-compat (agent observes its own namespace).  In prod-grade
            # mode the agent lives in a stable system namespace and this is
            # overridden at install via --set agent.config.K8S_NAMESPACE=<target>
            # so the agent pod survives target-namespace teardown.
            - name: K8S_NAMESPACE
              value: {{ .Values.agent.config.K8S_NAMESPACE | default .Release.Namespace | quote }}

            # ChaosCenter connection
            - name: CHAOS_CENTER_ENDPOINT
              value: {{ .Values.app.chaosCenter.endpoint | quote }}

            - name: CHAOS_PROJECT_ID
              value: {{ .Values.app.chaosCenter.projectId | quote }}

            - name: CHAOS_CLUSTER_ID
              value: {{ .Values.app.chaosCenter.clusterId | quote }}

            # Agent identity
            - name: AGENT_NAME
              value: {{ .Values.agent.name | quote }}

            - name: AGENT_MODE
              value: {{ .Values.agent.mode | quote }}

            - name: AGENT_SCOPE
              value: {{ .Values.agent.scope | quote }}

            # Infra dependencies
            - name: MONGO_URI
              value: {{ .Values.env.mongoUri | quote }}

            # LiteLLM Proxy Configuration
            {{- if .Values.agent.config.LITELLM_URL }}
            - name: LITELLM_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.agent.name }}-metadata
                  key: LITELLM_URL
            {{- end }}

            {{- if .Values.agent.secret.LITELLM_MASTER_KEY }}
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.agent.name }}-secret
                  key: LITELLM_MASTER_KEY
            {{- end }}

            {{- if .Values.agent.config.MODEL_ALIAS }}
            - name: MODEL_ALIAS
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.agent.name }}-metadata
                  key: MODEL_ALIAS
            {{- end }}

            # Blind-observer mode: exclude chaos tools from MCP & LLM prompt
            - name: MCP_INCLUDE_CHAOS_TOOLS
              value: {{ .Values.agent.config.MCP_INCLUDE_CHAOS_TOOLS | default "false" | quote }}

            # MCP event recency window (seconds) — see values.yaml comment.
            - name: EVENT_RECENCY_FALLBACK_SEC
              value: {{ .Values.agent.config.EVENT_RECENCY_FALLBACK_SEC | default "90" | quote }}

            # Scan loop (deployment mode)
            - name: SCAN_INTERVAL
              value: {{ .Values.agent.config.SCAN_INTERVAL | default "30" | quote }}
            - name: SCAN_INTERVAL_FAST
              value: {{ .Values.agent.config.SCAN_INTERVAL_FAST | default "15" | quote }}
            - name: SCAN_HEALTH_THRESHOLD
              value: {{ .Values.agent.config.SCAN_HEALTH_THRESHOLD | default "60" | quote }}

            {{- if .Values.watermark.persist }}
            - name: WATERMARK_FILE
              value: {{ .Values.agent.config.WATERMARK_FILE | default "/var/lib/flash-agent/watermark.json" | quote }}
            {{- end }}

            # MCP interactions log (REQUIRED by config.validate()).
            # Path is writable inside the container (default /tmp); set
            # agent.mcpInteractionsFile in values.yaml to override.
            - name: MCP_INTERACTIONS_FILE
              value: {{ .Values.agent.mcpInteractionsFile | default "/tmp/mcp/mcp_interactions.jsonl" | quote }}

            # Probe file paths — kept in sync with the readiness/liveness
            # exec probes below so kubelet and the agent agree on the path.
            {{- if .Values.probes.enabled }}
            - name: READY_FILE
              value: {{ .Values.probes.readyFile | default "/tmp/flash-agent-ready" | quote }}
            - name: ALIVE_FILE
              value: {{ .Values.probes.aliveFile | default "/tmp/flash-agent-alive" | quote }}
            {{- end }}

{{- range $env := .Values.agent.deploymentEnv }}
{{- if not (and $.Values.sidecar.enabled (eq $env.name "OPENAI_BASE_URL")) }}
            - name: {{ $env.name }}
              valueFrom:
                configMapKeyRef:
                  name: {{ $.Values.agent.name }}-metadata
                  key: {{ $env.key }}
{{- end }}
{{- end }}

{{- if .Values.sidecar.enabled }}
            # When sidecar is enabled, route all LLM calls through the sidecar proxy.
            # OPENAI_BASE_URL is intentionally not loaded from ConfigMap above when
            # sidecar is enabled (to avoid duplicate env vars where Python uses the first).
            - name: OPENAI_BASE_URL
              value: "http://localhost:{{ .Values.sidecar.port }}/v1"
{{- end }}

          volumeMounts:
            - name: agent-metadata
              mountPath: /etc/agent/metadata
              readOnly: true
            {{- if .Values.watermark.persist }}
            - name: watermark-state
              mountPath: /var/lib/flash-agent
            {{- end }}

          {{- if .Values.probes.enabled }}
          readinessProbe:
            exec:
              command: ["test", "-f", {{ .Values.probes.readyFile | default "/tmp/flash-agent-ready" | quote }}]
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds | default 60 }}
            periodSeconds: {{ .Values.probes.periodSeconds | default 30 }}
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - >-
                  test -f {{ .Values.probes.aliveFile | default "/tmp/flash-agent-alive" | quote }} &&
                  test $(( $(date +%s) - $(stat -c %Y {{ .Values.probes.aliveFile | default "/tmp/flash-agent-alive" | quote }}) )) -lt {{ .Values.probes.livenessStaleSeconds | default 180 }}
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds | default 60 }}
            periodSeconds: {{ .Values.probes.periodSeconds | default 30 }}
            failureThreshold: 3
          {{- end }}

{{- if .Values.sidecar.enabled }}
        # ── agent-sidecar: transparent metadata-injection proxy ──────
        - name: {{ .Values.sidecar.name }}
          image: "{{ .Values.sidecar.image.registry }}/{{ .Values.sidecar.image.repository }}:{{ .Values.sidecar.image.tag }}"
          imagePullPolicy: {{ .Values.sidecar.image.pullPolicy | default "Always" }}
          ports:
            - containerPort: {{ .Values.sidecar.port }}
              protocol: TCP
          env:
            - name: SIDECAR_PORT
              value: {{ .Values.sidecar.port | quote }}
            - name: UPSTREAM_URL
              value: {{ .Values.sidecar.upstream | quote }}
            - name: INJECTION_MODE
              value: {{ .Values.sidecar.injectionMode | default "openai-metadata" | quote }}
            - name: CONFIG_MOUNT
              value: "/etc/agent/metadata"
            - name: AGENT_NAME
              value: {{ .Values.agent.name | quote }}
            - name: AGENT_ROLE
              value: {{ .Values.sidecar.agentRole | default "" | quote }}
            # EXPERIMENT_ID, EXPERIMENT_RUN_ID, WORKFLOW_NAME are intentionally
            # NOT passed as sidecar env vars.  The sidecar reads NOTIFY_ID from
            # the ConfigMap mount to set trace_id; experiment-correlation
            # identifiers are handled server-side (GraphQL layer) and must not
            # be injected into LLM metadata to preserve blind-observer integrity.
            {{- if .Values.agentId }}
            - name: AGENT_ID
              value: {{ .Values.agentId | quote }}
            {{- end }}
          volumeMounts:
            - name: agent-metadata
              mountPath: /etc/agent/metadata
              readOnly: true
          resources:
            {{- toYaml .Values.sidecar.resources | nindent 12 }}
{{- end }}

      volumes:
        - name: agent-metadata
          configMap:
            name: {{ .Values.agent.name }}-metadata
        {{- if .Values.watermark.persist }}
        - name: watermark-state
          persistentVolumeClaim:
            claimName: {{ .Values.agent.name }}-watermark
        {{- end }}

apiVersion: agentcert.io/v1alpha1
kind: ChartServiceVersion
metadata:
  name: agents
  version: 0.1.0
  annotations:
    categories: AI Agents
    vendor: AgentCert
    chartDescription: >-
      AI agents that observe, diagnose, and remediate faults in Kubernetes environments.
spec:
  displayName: AI Agents
  categoryDescription: >-
    AI-powered agents that integrate with LitmusChaos to monitor, detect,
    and autonomously remediate faults in Kubernetes clusters.
  keywords:
    - ai-agent
    - kubernetes
    - observability
    - remediation
  maturity: alpha
  maintainers:
    - name: AgentCert Team
      email: agentcert@microsoft.com
  provider:
    name: AgentCert
  agents:
    - name: flash-agent
      displayName: Flash Agent
      description: "AI-powered log analysis agent that extracts metrics from Kubernetes pod logs using LLM and reports to Langfuse."
      version: "1.0.0"
      capabilities:
        - log-metrics-extraction
        - langfuse-trace-reporting
      # Install template metadata — used by the GraphQL server to identify and
      # enrich the install step at experiment-save time.
      installTemplateName: "install-agent"
      installImage: "agentcert/agentcert-install-agent:latest"
      # Context injection — Helm --set args the server injects into the install
      # template so the agent receives experiment context at runtime.
      contextInjection:
        - helmPath: "agent.config.EXPERIMENT_ID"
          source: "{{workflow.labels.workflow_id}}"
        - helmPath: "agent.config.EXPERIMENT_RUN_ID"
          source: "{{workflow.uid}}"
        - helmPath: "agent.config.WORKFLOW_NAME"
          source: "{{workflow.labels.subject}}"
    - name: k8s-agent
      displayName: K8s Agent
      description: "Kubernetes fault detection and autonomous remediation agent that monitors cluster health and auto-fixes issues."
      version: "1.0.0"
      capabilities:
        - fault-detection
        - auto-remediation
      installTemplateName: "install-agent"
      installImage: "agentcert/agentcert-install-agent:latest"
      contextInjection:
        - helmPath: "agent.config.EXPERIMENT_ID"
          source: "{{workflow.labels.workflow_id}}"
        - helmPath: "agent.config.EXPERIMENT_RUN_ID"
          source: "{{workflow.uid}}"
        - helmPath: "agent.config.WORKFLOW_NAME"
          source: "{{workflow.labels.subject}}"

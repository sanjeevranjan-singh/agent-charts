apiVersion: v1
kind: Secret
metadata:
  name: litellm-secrets
  namespace: litellm
type: Opaque
stringData:
  # Replace with your actual Azure OpenAI API key
  AZURE_API_KEY: "REPLACE_WITH_YOUR_AZURE_API_KEY"
  # Replace with your Azure OpenAI endpoint (e.g. https://your-resource.openai.azure.com)
  AZURE_API_BASE: "https://your-resource.openai.azure.com"
  # Replace with your LiteLLM master key
  LITELLM_MASTER_KEY: "REPLACE_WITH_YOUR_LITELLM_MASTER_KEY"
  # Langfuse tracing — required for success_callback/failure_callback in config.yaml
  LANGFUSE_PUBLIC_KEY: "REPLACE_WITH_YOUR_LANGFUSE_PUBLIC_KEY"
  LANGFUSE_SECRET_KEY: "REPLACE_WITH_YOUR_LANGFUSE_SECRET_KEY"
  LANGFUSE_HOST: "https://us.cloud.langfuse.com"

apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      - model_name: gpt-4.1-mini
        litellm_params:
          model: azure/gpt-4.1-mini
          api_base: os.environ/AZURE_API_BASE
          api_key: os.environ/AZURE_API_KEY
          api_version: "2025-01-01-preview"

      # Alias so agents can use "gpt-4o-mini" as MODEL_ALIAS
      - model_name: gpt-4o-mini
        litellm_params:
          model: azure/gpt-4.1-mini
          api_base: os.environ/AZURE_API_BASE
          api_key: os.environ/AZURE_API_KEY
          api_version: "2025-01-01-preview"

    litellm_settings:
      drop_params: true
      set_verbose: false

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      allow_requests_on_health: true

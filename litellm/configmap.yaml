apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      # model_name is substituted from AZURE_OPENAI_DEPLOYMENT in build-litellm.sh.
      # Agents call LiteLLM with model=<deployment-name>; traces show the real model.
      - model_name: LITELLM_MODEL_NAME
        litellm_params:
          model: os.environ/AZURE_MODEL
          api_base: os.environ/AZURE_API_BASE
          api_key: os.environ/AZURE_API_KEY
          api_version: os.environ/AZURE_API_VERSION
        model_info:
          base_model: os.environ/AZURE_MODEL

    litellm_settings:
      drop_params: false
      set_verbose: false
      # Langfuse callback — all LLM calls are traced automatically.
      # Flash Agent sends extra_body.metadata on each call for rich trace context.
      success_callback: ["langfuse"]
      failure_callback: ["langfuse"]
      # Retry settings — automatic retry on transient failures
      num_retries: 3
      retry_after: 30

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      allow_requests_on_health: true
